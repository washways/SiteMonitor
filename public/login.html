<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>WASH Dashboard – Login</title>
    <meta name="description"
        content="Water Access &amp; Sanitation pump-site monitoring dashboard for Malawi. Powered by DCP Water API and SonSetLink." />

    <!-- Open Graph / WhatsApp / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://washways.org/SiteMonitor" />
    <meta property="og:title" content="💧 WaterPoint Dashboard � Solar & Pump Site Monitoring" />
    <meta property="og:description"
        content="Monitor solar-powered and hand pump waterpoints across Malawi. Track flow data, view live maps and download reports." />
    <meta property="og:image" content="https://washways.org/SiteMonitor/social-preview.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter / X Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="💧 WaterPoint Dashboard � Solar & Pump Site Monitoring" />
    <meta name="twitter:description" content="Monitor solar-powered and hand pump waterpoints. Track flow, pump status and site maps." />
    <meta name="twitter:image" content="https://washways.org/SiteMonitor/social-preview.png" />
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='28' font-size='28'>💧</text></svg>" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f2744 0%, #164e8a 60%, #0ea5e9 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        }

        .card {
            background: #fff;
            border-radius: 14px;
            padding: 40px 36px 32px;
            width: 360px;
            max-width: 92%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
            text-align: center;
        }

        .logo {
            font-size: 48px;
            margin-bottom: 8px;
        }

        h1 {
            font-size: 20px;
            font-weight: 700;
            color: #1e3a5f;
            margin-bottom: 4px;
        }

        .subtitle {
            font-size: 13px;
            color: #6b7280;
            margin-bottom: 28px;
        }

        .field {
            margin-bottom: 16px;
            text-align: left;
        }

        .field label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #374151;
            margin-bottom: 6px;
        }

        .field input {
            width: 100%;
            padding: 10px 12px;
            border: 1.5px solid #d1d5db;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.15s;
            outline: none;
        }

        .field input:focus {
            border-color: #0ea5e9;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: #1e3a5f;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.15s;
            margin-top: 4px;
        }

        .btn:hover {
            background: #164e8a;
        }

        #errMsg {
            margin-top: 14px;
            color: #dc2626;
            font-size: 13px;
            min-height: 18px;
        }

        .footer {
            margin-top: 24px;
            font-size: 11px;
            color: #9ca3af;
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="logo">💧</div>
        <h1>WASH Dashboard</h1>
        <p class="subtitle">No sign-in is required. Opening the dashboard now.</p>
        <p class="footer"><a href="index.html">Open dashboard</a></p>
    </div>

    <script>
        if (window.location.hostname === '127.0.0.1') {
            window.location.replace(window.location.href.replace('127.0.0.1', 'localhost'));
        }

        const params = new URLSearchParams(window.location.search);
        const next = params.get('next') || 'index.html';
        const needsProxyFlag = window.location.search.includes('proxy=1') && !next.includes('proxy=1');
        const nextWithFlags = needsProxyFlag ? `${next}${next.includes('?') ? '&' : '?'}proxy=1` : next;

        if (window.location.search.includes('proxy=1')) {
            localStorage.setItem('wash_force_proxy', '1');
        }

        sessionStorage.setItem('wash_auth', '1');
        window.location.replace(nextWithFlags);
    </script>
</body>

</html>
