<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>WASH Dashboard</title>
  <meta name="description"
    content="Real-time water pump monitoring for UNICEF WASH sites across Malawi. Track flow data, view maps and download reports." />

  <!-- Open Graph / WhatsApp / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://washways.github.io/SiteMonitor/login.html" />
  <meta property="og:title" content="💧 WASH Dashboard – Water Monitoring, Malawi" />
  <meta property="og:description"
    content="Real-time water pump monitoring for UNICEF WASH sites across Malawi. Track flow data, view maps and download reports." />
  <meta property="og:image" content="https://washways.github.io/SiteMonitor/social-preview.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />

  <!-- Twitter / X Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="💧 WASH Dashboard – Water Monitoring, Malawi" />
  <meta name="twitter:description" content="Real-time water pump monitoring for UNICEF WASH sites across Malawi." />
  <meta name="twitter:image" content="https://washways.github.io/SiteMonitor/social-preview.png" />
  <meta name="description" content="Unified WASH water-pump monitoring dashboard for Malawi sites." />

  <!-- Inline SVG favicon – water drop -->
  <link rel="icon" type="image/svg+xml"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='28' font-size='28'>💧</text></svg>" />

  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.plot.ly/plotly-2.30.0.min.js"></script>
  <!-- Auth gate: redirect to login if not authenticated this session -->
  <script>
    if (sessionStorage.getItem('wash_auth') !== '1') {
      window.location.replace('login.html');
    }
  </script>
</head>

<body>
  <!-- ===== HEADER ===== -->
  <header>
    <h1>💧 WASH Dashboard</h1>
    <div class="controls">
      <button id="btnSettings" class="btn-icon" title="Settings">⚙️</button>
      <a href="https://github.com/washways/SiteMonitor#readme" target="_blank" rel="noopener" class="btn-doc"
        title="Documentation">📖 Docs</a>
      <label class="chk">
        <input id="malawiOnly" type="checkbox" checked />
        Malawi only
      </label>
      <label>
        Days
        <input id="days" type="number" min="1" max="365" value="7" />
      </label>
      <button id="reload" class="btn-primary">▶ Load</button>
      <button id="btnExportCSV" class="btn-csv" title="Download summarised CSV">⬇ CSV</button>
    </div>
  </header>

  <!-- ===== SETTINGS MODAL ===== -->
  <div id="settingsModal" class="modal" style="display:none;">
    <div class="modal-content">
      <span id="closeSettings" class="close">&times;</span>
      <h2>API Settings</h2>
      <p><small>Stored locally in your browser.</small></p>

      <div class="field">
        <label>DCP API Key</label>
        <input type="password" id="dcpToken" placeholder="dcp…" />
      </div>

      <hr />

      <div class="field">
        <label>SonSetLink User</label>
        <input type="text" id="sslUser" />
      </div>
      <div class="field">
        <label>SonSetLink Password</label>
        <input type="password" id="sslPass" />
      </div>

      <div style="margin-top:20px; text-align:right;">
        <button id="saveSettings" class="btn-primary">Save &amp; Reload</button>
      </div>
    </div>
  </div>

  <!-- ===== STATUS BAR ===== -->
  <div id="statusBar"><span id="status">Ready.</span></div>

  <!-- ===== MAIN CONTENT ===== -->
  <main>

    <!-- Flow Report Table -->
    <section class="panel panel-table">
      <div class="panel-head">
        <h2>Flow Report (<span id="daysLabel">7</span> Days)</h2>
        <button id="btnExportCSV2" class="btn-csv" title="Download summarised CSV">⬇ CSV</button>
      </div>
      <div class="table-scroll">
        <table id="reportTable">
          <thead>
            <tr>
              <th>Source</th>
              <th>Site Name</th>
              <th>ID</th>
              <th>Total Flow (m³)</th>
              <th>Trend</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>

    <!-- Map -->
    <section class="panel panel-map">
      <div id="map"></div>
    </section>

    <!-- Detail Chart (shown on row/marker click) -->
    <section id="detailSection" class="panel panel-chart" style="display:none;">
      <h2 id="detailTitle">Site Details</h2>
      <div id="chart"></div>
      <pre id="detail" style="display:none;"></pre>
    </section>

  </main>

  <script src="app.js"></script>
</body>

</html>
