<!DOCTYPE html>
<html>

<head>
    <title>Debug SSL URL</title>
    <style>
        body {
            font-family: monospace;
            padding: 20px;
        }

        .log {
            margin-bottom: 5px;
        }

        .success {
            color: green;
            font-weight: bold;
        }

        .fail {
            color: red;
        }

        .cors {
            color: orange;
        }
    </style>
</head>

<body>
    <h1>SonSetLink URL Debugger</h1>
    <p>Testing paths...</p>
    <div id="logs"></div>
    <script>
        const logEl = document.getElementById("logs");
        function log(msg, type) {
            const d = document.createElement("div");
            d.textContent = msg;
            d.className = "log " + (type || "");
            logEl.appendChild(d);
        }

        const creds = "?login=unicef&password=nzVa-ePcV.rv";
        const paths = [
            "/api/sites.json.php",
            "/api/sites.php",
            "/api/sites.json",
            "/sites.json.php",
            "/sites.php",
            "/api/v1/sites",
            "/wp-json/api/sites"
        ];
        const domains = [
            "https://sonsetlink.org",
            "https://www.sonsetlink.org",
            "http://sonsetlink.org"
        ];

        async function run() {
            for (const d of domains) {
                for (const p of paths) {
                    const u = d + p + creds;
                    log(`Checking ${d + p}...`);
                    try {
                        const res = await fetch(u);
                        if (res.ok) {
                            log(`[SUCCESS] ${u} returned ${res.status}`, "success");
                        } else {
                            if (res.status === 404) {
                                log(`[404] ${u} not found`, "fail");
                            } else {
                                log(`[${res.status}] ${u}`, "fail");
                            }
                        }
                    } catch (e) {
                        if (e.message.includes("Failed to fetch")) {
                            log(`[CORS/Network] ${u} blocked`, "cors");
                        } else {
                            log(`[Error] ${u} ${e.message}`, "fail");
                        }
                    }
                }
            }
            log("Done.");
        }
        run();
    </script>
</body>

</html>
