<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CORS Test - Victron VRM</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            max-width: 600px;
            margin: 2rem auto;
            padding: 0 1rem;
            line-height: 1.5;
        }

        .card {
            border: 1px solid #ddd;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
        }

        input {
            width: 100%;
            padding: 0.8rem;
            margin: 0.5rem 0 1rem;
            box-sizing: border-box;
            font-family: monospace;
        }

        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
        }

        button:hover {
            background: #0056b3;
        }

        #result {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 4px;
            display: none;
        }

        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        code {
            background: rgba(0, 0, 0, 0.05);
            padding: 0.2rem 0.4rem;
            border-radius: 3px;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>VRM CORS Test</h1>
        <p>This page will attempt to connect directly to the Victron VRM API from your browser.</p>

        <label for="token"><strong>Enter your VRM Access Token:</strong></label>
        <input type="text" id="token" placeholder="Paste your token here (starts with 'ey...' or similar)" />

        <button onclick="runTest()">Test Connection</button>

        <div id="result"></div>
    </div>

    <script>
        async function runTest() {
            const token = document.getElementById('token').value.trim();
            const resultDiv = document.getElementById('result');

            if (!token) {
                showResult('Please enter a token.', 'error');
                return;
            }

            resultDiv.style.display = 'block';
            resultDiv.innerHTML = 'Testing...';
            resultDiv.className = '';

            try {
                // Attempt to fetch /users/me
                // This is a simple read endpoint
                const url = 'https://vrmapi.victronenergy.com/v2/users/me';

                const response = await fetch(url, {
                    method: 'GET',
                    headers: {
                        'X-Authorization': 'Bearer ' + token,
                        'Accept': 'application/json'
                    }
                });

                if (response.ok) {
                    const data = await response.json();
                    showResult(`<strong>SUCCESS!</strong><br>Connected to VRM API.<br>User ID: ${data.user.id}<br>Name: ${data.user.name}<br><br>This means <strong>CORS is enabled</strong> and a serverless version IS possible!`, 'success');
                } else {
                    const text = await response.text();
                    showResult(`<strong>FAILED (HTTP ${response.status})</strong><br>Message: ${text}`, 'error');
                }
            } catch (error) {
                console.error(error);
                let msg = error.message;
                if (msg.includes('Failed to fetch')) {
                    msg += ' (This usually indicates a CORS block)';
                }
                showResult(`<strong>FAILED (Network Error)</strong><br>${msg}<br><br>This likely means <strong>CORS is blocked</strong> by Victron.`, 'error');
            }
        }

        function showResult(html, type) {
            const el = document.getElementById('result');
            el.innerHTML = html;
            el.className = type;
            el.style.display = 'block';
        }
    </script>
</body>

</html>
