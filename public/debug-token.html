<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deep Debug - VRM Token</title>
    <style>
        body {
            font-family: system-ui;
            max-width: 800px;
            margin: 2rem auto;
            padding: 1rem;
        }

        .box {
            border: 1px solid #ccc;
            padding: 1rem;
            margin-bottom: 1rem;
            border-radius: 4px;
        }

        textarea {
            width: 100%;
            height: 60px;
            font-family: monospace;
        }

        button {
            background: #d946ef;
            color: white;
            border: none;
            padding: 10px 20px;
            font-weight: bold;
            cursor: pointer;
        }

        .log {
            background: #1e293b;
            color: #eee;
            padding: 1rem;
            border-radius: 4px;
            overflow-x: auto;
            white-space: pre-wrap;
            font-family: monospace;
        }

        .success {
            color: #4ade80;
            font-weight: bold;
        }

        .fail {
            color: #f87171;
        }
    </style>
</head>

<body>
    <h1>VRM Token Debugger</h1>
    <div class="box">
        <label><strong>Paste Token:</strong></label>
        <textarea id="token"></textarea>
        <div style="margin-top:5px; font-size: 0.9em; color:#666;" id="stats">Length: 0</div>
        <br>
        <button onclick="runTests()">RUN DIAGNOSTIC</button>
    </div>

    <h3>Results</h3>
    <div id="console" class="log">Ready...</div>

    <script>
        const el = (id) => document.getElementById(id);
        const log = (msg) => el("console").innerHTML += msg + "\n";
        const clear = () => el("console").innerHTML = "";

        el("token").addEventListener("input", (e) => {
            const val = e.target.value;
            el("stats").textContent = `Length: ${val.length} chars (Trimmed: ${val.trim().length})`;
        });

        async function runTests() {
            clear();
            const raw = el("token").value;
            const token = raw.trim();

            log(`ANALYSIS:`);
            log(`Raw Length: ${raw.length}`);
            log(`Trimmed Length: ${token.length}`);
            log(`Preview: ${token.substring(0, 5)}...${token.substring(token.length - 5)}`);

            if (token.length < 30) {
                log(`<span class="fail">WARNING: Token looks suspicously short. Are you using the ID instead of the Secret?</span>`);
            }
            log("-".repeat(40));

            const scenarios = [
                { name: "X-Auth Bearer", headers: { "X-Authorization": `Bearer ${token}` } },
                { name: "X-Auth Token", headers: { "X-Authorization": `Token ${token}` } },
                { name: "Auth Bearer", headers: { "Authorization": `Bearer ${token}` } },
                { name: "Auth Token", headers: { "Authorization": `Token ${token}` } }
            ];

            const url = "https://vrmapi.victronenergy.com/v2/users/me";

            for (const s of scenarios) {
                log(`Test: <strong>${s.name}</strong>`);
                try {
                    const res = await fetch(url, { method: "GET", headers: s.headers });
                    const text = await res.text();

                    if (res.ok) {
                        log(`<span class="success">SUCCESS (HTTP ${res.status})</span>`);
                        log(`Response: ${text.slice(0, 100)}...`);
                        log(`--> <strong>SOLUTION FOUND: Use header format '${s.name}'</strong>`);
                        return; // Stop on first success
                    } else {
                        log(`<span class="fail">FAILED (HTTP ${res.status})</span>`);
                        log(`Body: ${text}`);
                    }
                } catch (e) {
                    log(`<span class="fail">ERROR (Network/CORS?)</span>: ${e.message}`);
                }
                log("-".repeat(20));
            }
            log(`\nCONCLUSION: All attempts failed. The token itself is likely rejected by Victron.`);
        }
    </script>
</body>

</html>
